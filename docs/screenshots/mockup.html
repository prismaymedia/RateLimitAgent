<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateLimitAgent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    padding: 32px;
  }

  .container {
    background: #0d0d1a;
    border-radius: 20px;
    padding: 32px 40px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .mockup-label {
    color: rgba(255,255,255,0.15);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    text-align: center;
    margin-bottom: 24px;
  }

  .row {
    display: flex;
    gap: 48px;
    align-items: flex-start;
  }

  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .col-label {
    color: rgba(255,255,255,0.25);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-align: center;
  }

  .menubar {
    background: rgba(30, 30, 50, 0.95);
    border-radius: 10px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    width: 440px;
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
  }

  .menubar-left { display: flex; align-items: center; gap: 18px; }
  .apple-logo { color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500; }
  .menu-item { color: rgba(255,255,255,0.65); font-size: 12px; font-weight: 500; }
  .menu-item.bold { color: rgba(255,255,255,0.9); font-weight: 600; }

  .menubar-right { display: flex; align-items: center; gap: 12px; }

  .status-item {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(233,69,96,0.15);
    padding: 2px 10px 2px 6px;
    border-radius: 4px;
    border: 1px solid rgba(233,69,96,0.2);
  }
  .countdown-text {
    color: #e94560;
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .clock { color: rgba(255,255,255,0.5); font-size: 11px; }
  .divider { width: 1px; height: 14px; background: rgba(255,255,255,0.12); }
  .battery { color: rgba(255,255,255,0.5); font-size: 11px; }

  .status-item.available {
    background: rgba(52,211,153,0.12);
    border-color: rgba(52,211,153,0.25);
  }
  .checkmark { color: #34d399; font-size: 11px; font-weight: 700; }

  /* Popover */
  .arrow-up {
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 8px solid rgba(35, 35, 55, 0.97);
  }

  .popover {
    background: rgba(35, 35, 55, 0.97);
    backdrop-filter: blur(40px);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    width: 280px;
    overflow: hidden;
  }

  .popover-header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .popover-header-icon {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #e94560, #c23152);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .popover-header h2 { color: #fff; font-size: 14px; font-weight: 600; }

  .popover-body { padding: 0 16px 16px; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }

  .info-label { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 500; }
  .info-value { color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 500; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-rate-limited {
    background: rgba(233,69,96,0.15);
    color: #e94560;
    border: 1px solid rgba(233,69,96,0.2);
  }

  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #e94560; }

  .countdown-section {
    background: rgba(233,69,96,0.06);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 8px;
    border: 1px solid rgba(233,69,96,0.1);
  }

  .countdown-row { display: flex; justify-content: space-between; align-items: center; }
  .countdown-label { color: rgba(255,255,255,0.5); font-size: 12px; }

  .countdown-big {
    color: #e94560;
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .progress-bar-bg {
    height: 4px;
    background: rgba(233,69,96,0.15);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%; width: 65%;
    background: linear-gradient(90deg, #e94560, #ff6b81);
    border-radius: 2px;
  }

  .reset-time { color: rgba(255,255,255,0.35); font-size: 10px; margin-top: 6px; }

  .btn-check {
    width: 100%; padding: 8px; margin-top: 12px;
    background: rgba(233,69,96,0.12);
    border: 1px solid rgba(233,69,96,0.2);
    border-radius: 8px; color: #e94560;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
  }

  .popover-footer {
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; justify-content: space-between;
  }

  .footer-text { color: rgba(255,255,255,0.3); font-size: 10px; }
  .quit-link { color: rgba(255,255,255,0.3); font-size: 10px; text-decoration: none; }
  .quit-link:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="container">
  <div class="mockup-label">RateLimitAgent · macOS Menu Bar</div>
  <div class="row">
    <!-- LEFT: Menu bar only -->
    <div class="col">
      <div class="col-label">Menu Bar</div>
      <div class="menubar">
        <div class="menubar-left">
          <span class="apple-logo"></span>
          <span class="menu-item bold">Finder</span>
          <span class="menu-item">File</span>
          <span class="menu-item">Edit</span>
          <span class="menu-item">View</span>
        </div>
        <div class="menubar-right">
          <span class="status-item">
            <span class="checkmark">⏱</span>
            <span class="countdown-text">01:54:47</span>
          </span>
          <span class="clock">10:41 PM</span>
          <div class="divider"></div>
          <span class="battery">🔋 87%</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: Popover -->
    <div class="col">
      <div class="col-label">Click to Open</div>
      <div class="menubar" style="width:280px;">
        <div class="menubar-left">
          <span class="apple-logo"></span>
          <span class="menu-item bold">Finder</span>
          <span class="menu-item">File</span>
        </div>
        <div class="menubar-right">
          <span class="status-item" style="background:rgba(233,69,96,0.25);border-color:rgba(233,69,96,0.4);">
            <span class="checkmark">⏱</span>
            <span class="countdown-text">01:54:47</span>
          </span>
        </div>
      </div>
      <div class="arrow-up"></div>
      <div class="popover">
        <div class="popover-header">
          <div class="popover-header-icon">OC</div>
          <h2>OpenCode Free Models</h2>
        </div>
        <div class="popover-body">
          <div class="info-row">
            <span class="info-label">Model</span>
            <span class="info-value">deepseek-v4-flash-free</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="badge badge-rate-limited">
              <span class="badge-dot"></span>
              Rate Limited
            </span>
          </div>
          <div class="countdown-section">
            <div class="countdown-row">
              <span class="countdown-label">Resets in</span>
              <span class="countdown-big">01:54:47</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill"></div>
            </div>
            <div class="reset-time">Rate limit resets at 12:36 AM</div>
          </div>
          <button class="btn-check">⟳ Check Now</button>
        </div>
        <div class="popover-footer">
          <span class="footer-text">Last check: 2 min ago</span>
          <a href="#" class="quit-link">Quit</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
